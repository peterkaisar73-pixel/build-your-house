<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برنامج ابني بيتك - كورس صخرة العهد</title>

<style>
body{
    font-family: Tahoma;
    background:#f5f1e8;
    margin:0;
    padding:20px;
    direction:rtl;
}

.container{
    max-width:650px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo img{
    width:180px;
}

h1{
    text-align:center;
    color:#3d2b1f;
    margin-bottom:5px;
}

h2{
    text-align:center;
    color:#7a5c43;
    margin-top:0;
    font-size:20px;
}

p{
    text-align:center;
    color:#555;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    background:#7a5c43;
    color:white;
    border:none;
    padding:15px;
    margin-top:25px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#5d4633;
}

#message{
    text-align:center;
    margin-top:20px;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png" alt="logo">
</div>

<h1>الكنيسة الرسولية بإمبابة</h1>

<h2>برنامج ابني بيتك</h2>

<h2>كورس صخرة العهد</h2>

<p>
بداية الكورس الخميس 17 سبتمبر
</p>

<form id="registerForm">

<label>الاسم بالكامل</label>
<input type="text" id="name" required>

<label>رقم الموبايل</label>
<input type="tel" id="phone" required>

<label>السن</label>
<input type="number" id="age" required>

<label>الحالة الاجتماعية</label>
<select id="status" required>
<option value="">اختر</option>
<option>أعزب</option>
<option>مخطوب</option>
<option>متزوج</option>
</select>

<label>الكنيسة التابع لها</label>
<input type="text" id="church" required>

<button type="submit">تسجيل</button>

</form>

<div id="message"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/ضع_لينك_الويب_آب_هنا/exec";

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault();

const cairoTime = new Date().toLocaleString("en-US", {
    timeZone: "Africa/Cairo"
});

const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    age: document.getElementById("age").value,
    status: document.getElementById("status").value,
    church: document.getElementById("church").value,
    submittedAt: cairoTime
};

try{

const response = await fetch(scriptURL,{
    method:"POST",
    body:JSON.stringify(data)
});

const result = await response.text();

document.getElementById("message").innerHTML = result;

if(result.includes("تم التسجيل بنجاح")){
    document.getElementById("registerForm").reset();
}

}catch(error){

document.getElementById("message").innerHTML =
"حدث خطأ أثناء التسجيل";

}

});

</script>

</body>
</html>

<script>
  const form = document.getElementById('regForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const successBox = document.getElementById('successBox');

  form.addEventListener('submit', async function(e){

    e.preventDefault();

    errorMsg.style.display = 'none';

    submitBtn.disabled = true;
    submitBtn.textContent = 'جاري الحفظ...';

    const entry = {
      husbandName: document.getElementById('husbandName').value.trim(),
      husbandPhone: document.getElementById('husbandPhone').value.trim(),
      wifeName: document.getElementById('wifeName').value.trim(),
      wifePhone: document.getElementById('wifePhone').value.trim(),
      yearsMarried: document.getElementById('yearsMarried').value,
      childrenCount: document.getElementById('childrenCount').value,

      submittedAt: new Date().toLocaleString('ar-EG', {
        timeZone: 'Africa/Cairo'
      })
    };

    try {

      // التحقق من وجود الرقم مسبقًا
      const checkResponse = await fetch(
        `https://sheetdb.io/api/v1/wnb9qfuidlpbg/search?husbandPhone=${entry.husbandPhone}`
      );

      const existingData = await checkResponse.json();

      if (existingData.length > 0) {

        alert("تم التسجيل مسبقًا بهذا الرقم");

        submitBtn.disabled = false;
        submitBtn.textContent = 'تأكيد التسجيل في الكورس';

        return;
      }

      // حفظ البيانات
      const response = await fetch(
        "https://sheetdb.io/api/v1/wnb9qfuidlpbg",
        {
          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            data: entry
          })
        }
      );

      const result = await response.json();

      console.log(result);

      if(response.ok){

        form.style.display = 'none';

        successBox.style.display = 'block';

      } else {

        throw new Error('save failed');
      }

    } catch(err){

      console.error(err);

      alert("حدث خطأ أثناء التسجيل");

      submitBtn.disabled = false;

      submitBtn.textContent = 'تأكيد التسجيل في الكورس';
    }

  });
</script>
